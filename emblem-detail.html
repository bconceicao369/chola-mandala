<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-store">
<title>Emblem Detail — Akhila Vishw Bharathiya Seva Samaj</title>
<style>
  body{margin:0;font-family:system-ui,sans-serif;background:#0a1228;color:#e7e6f3;padding-bottom:50px}
  h1{text-align:center;font-weight:600;padding:30px 16px 4px;font-size:1.15rem;letter-spacing:.06em}
  p.note{text-align:center;opacity:.6;font-size:.84rem;margin:0 0 18px}
  .full{display:flex;justify-content:center;padding:10px 16px 24px}
  .full img{width:min(820px,94vw);height:auto;filter:drop-shadow(0 14px 32px rgba(0,0,0,.5))}
  .zooms{display:flex;flex-wrap:wrap;justify-content:center;gap:22px;padding:0 16px}
  .z{width:380px;height:430px;overflow:hidden;border-radius:16px;border:1px solid rgba(230,196,94,.25);
     background:radial-gradient(120% 120% at 50% 0%,#1a285f,#0a1228);position:relative}
  .z img{position:absolute;width:1900px;max-width:none}
  .z.lion img{left:-1330px;top:-330px}
  .z.uni  img{left:-40px;top:-330px}
  .z.phx  img{left:-680px;top:-30px}
  .cap{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--g,#e6c45e)}
</style>
</head>
<body>
  <h1>Akhila Vishw Bharathiya Seva Samaj — Emblem Detail</h1>
  <p class="note">Full crest, plus zoomed-in on each figure so the detail is clear.</p>
  <div class="full"><img src="assets/img/emblem-v5.svg?d=4" alt="full emblem"></div>
  <div class="zooms">
    <div class="z uni"><img src="assets/img/emblem-v5.svg?d=4"><span class="cap">Unicorn</span></div>
    <div class="z phx"><img src="assets/img/emblem-v5.svg?d=4"><span class="cap">Phoenix</span></div>
    <div class="z lion"><img src="assets/img/emblem-v5.svg?d=4"><span class="cap">Lion</span></div>
  </div>
</body>
</html>
