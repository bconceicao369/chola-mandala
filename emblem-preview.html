<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Emblem Preview — Akhila Vishw Bharathiya Seva Samaj</title>
<style>
  body{margin:0;font-family:system-ui,sans-serif;background:#0c1430;color:#e7e6f3}
  .row{display:flex;flex-wrap:wrap}
  .panel{flex:1;min-width:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:18px}
  .dark{background:radial-gradient(120% 120% at 50% 0%,#1a285f,#0a1228)}
  .light{background:#ffffff;color:#333}
  .cream{background:#faf6ec;color:#333}
  .panel img{width:min(440px,90vw);height:auto;filter:drop-shadow(0 12px 30px rgba(0,0,0,.45))}
  .light img,.cream img{filter:drop-shadow(0 10px 24px rgba(0,0,0,.16))}
  .lab{font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;opacity:.8}
  h1{text-align:center;font-weight:600;padding:34px 16px 0;font-size:1.1rem;letter-spacing:.06em}
  p.note{text-align:center;opacity:.6;font-size:.82rem;padding:0 16px 24px}
</style>
</head>
<body>
  <h1>Akhila Vishw Bharathiya Seva Samaj — Emblem</h1>
  <p class="note">Clean vector crest — razor-sharp at any size. Shown on the three backgrounds it will appear on.</p>
  <div class="row">
    <div class="panel dark"><span class="lab">On Dark</span><img src="assets/img/emblem-v4.svg" alt="emblem on dark"></div>
    <div class="panel light"><span class="lab">On White</span><img src="assets/img/emblem-v4.svg" alt="emblem on white"></div>
    <div class="panel cream"><span class="lab">On Cream</span><img src="assets/img/emblem-v4.svg" alt="emblem on cream"></div>
  </div>
</body>
</html>
